services:
  toonflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GIT: ${GIT:-github}
        TAG: ${TAG:-}
        BRANCH: ${BRANCH:-}
    image: toonflow:${TAG:-latest}
    container_name: toonflow
    restart: unless-stopped
    ports:
      - "60000:60000"
    environment:
      - NODE_ENV=prod
      - DATA_ROOT=/app/data
    volumes:
      - ../logs:/app/logs
      - ../data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:60000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
