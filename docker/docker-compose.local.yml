# 本地打包测试用，使用本地源码构建
# 用法: docker-compose -f docker/docker-compose.local.yml up -d --build

services:
  toonflow:
    build:
      context: ..
      dockerfile: docker/Dockerfile.local
    image: toonflow:local
    container_name: toonflow-local
    restart: unless-stopped
    ports:
      - "60000:60000"
    environment:
      - NODE_ENV=prod
      - DATA_ROOT=/app/data
    volumes:
      - ../logs:/app/logs
      - ../data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:60000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
